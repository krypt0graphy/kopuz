name: Update Nix Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (defaults to kopuz/Cargo.toml)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V=$(awk -F'"' '/^version/{print $2; exit}' kopuz/Cargo.toml)
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Bump version in package.nix
        run: |
          sed -i 's/version = "[^"]*";/version = "${{ steps.ver.outputs.version }}";/' nix/package.nix

      - name: Compute src hash (nurl)
        run: |
          SRC_HASH=$(nix run nixpkgs#nurl -- --hash "https://github.com/temidaradev/kopuz" "v${{ steps.ver.outputs.version }}")
          if [ -z "$SRC_HASH" ]; then
            echo "nurl failed to produce a hash"
            exit 1
          fi
          echo "src hash: $SRC_HASH"
          ESCAPED=$(printf '%s\n' "$SRC_HASH" | sed -e 's/[\/&]/\\&/g')
          sed -i "0,/hash = \"sha256-[^\"]*\";/{s|hash = \"sha256-[^\"]*\";|hash = \"$ESCAPED\";|}" nix/package.nix

      - name: Compute cargoHash
        shell: bash {0}
        run: |
          set +e +o pipefail
          FAKE='sha256-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
          sed -i "s|cargoHash = \"sha256-[^\"]*\";|cargoHash = \"$FAKE\";|" nix/package.nix
          BUILD_OUT=$(nix build --no-link --print-build-logs --impure --expr '
            with import <nixpkgs> {};
            callPackage ./nix/package.nix {}
          ' -I nixpkgs=channel:nixos-unstable 2>&1)
          echo "$BUILD_OUT" | tail -80
          GOT=$(echo "$BUILD_OUT" | grep -oE 'got:[[:space:]]+sha256-[A-Za-z0-9+/=]+' | tail -1 | awk '{print $2}')
          if [ -z "$GOT" ]; then
            GOT=$(echo "$BUILD_OUT" | grep -oE 'use[[:space:]]+"sha256-[A-Za-z0-9+/=]+"' | tail -1 | sed -E 's/.*"(sha256-[^"]+)".*/\1/')
          fi
          if [ -z "$GOT" ]; then
            echo "Failed to extract cargoHash"
            exit 1
          fi
          echo "cargoHash: $GOT"
          ESCAPED=$(printf '%s\n' "$GOT" | sed -e 's/[\/&]/\\&/g')
          sed -i "s|cargoHash = \"sha256-[^\"]*\";|cargoHash = \"$ESCAPED\";|" nix/package.nix

      - name: Diff
        run: git --no-pager diff nix/package.nix

      - uses: peter-evans/create-pull-request@v7
        with:
          title: 'chore(nix): update package to v${{ steps.ver.outputs.version }}'
          body: |
            Auto-update from `update-nix.yml`.

            - Bumped `version` in `nix/package.nix` to `${{ steps.ver.outputs.version }}`
            - Refreshed `hash` (src) and `cargoHash`
          branch: nix-auto-update
          base: master
          commit-message: 'chore(nix): bump to v${{ steps.ver.outputs.version }}'
          delete-branch: true
